<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Demo Cuestionario Inteligente · Sports World</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="vendor/react.production.min.js"></script>
  <script src="vendor/react-dom.production.min.js"></script>
  <style>
    html,body{margin:0;background:#fff;font-family:system-ui,-apple-system,Segoe UI,Roboto,sans-serif}
    #keybar{position:sticky;top:0;z-index:50;display:flex;gap:.5rem;align-items:center;flex-wrap:wrap;
      padding:.6rem .9rem;background:#0e1b2c;color:#fff;font-size:.85rem;border-bottom:2px solid #e11d48}
    #keybar input{flex:1;min-width:220px;padding:.45rem .6rem;border-radius:6px;border:1px solid #33455c;
      background:#fff;color:#0e1b2c;font-size:.85rem}
    #keybar button{padding:.45rem .9rem;border:0;border-radius:6px;background:#e11d48;color:#fff;
      font-weight:600;cursor:pointer;font-size:.85rem}
    #keybar .muted{opacity:.8;font-size:.78rem;width:100%}
    #keychip{position:fixed;right:12px;bottom:12px;z-index:50;padding:.4rem .7rem;border-radius:999px;
      background:#0e1b2c;color:#fff;border:0;cursor:pointer;font-size:.78rem;display:none}
  </style>
</head>
<body>
  <!-- Proxy autónomo en Vercel: el demo llama aquí y la API key vive como env var en Vercel.
       El navegador nunca ve la llave; ningún visitante necesita pegar nada. -->
  <script>window.DEMO_PROXY_URL = "https://sw-claude-proxy.eric-bfb.workers.dev";</script>

  <!-- Bring-your-own-key: solo se usa si NO hay proxy configurado arriba. -->
  <div id="keybar">
    <strong>🔑 Demo en vivo:</strong>
    <input id="keyinput" type="password" placeholder="Pega tu API key de Anthropic (sk-ant-...)" autocomplete="off" spellcheck="false" />
    <button id="keysave">Guardar y activar</button>
    <span class="muted">Se guarda solo en tu navegador. Consíguela en console.anthropic.com → API Keys. El cuestionario funciona sin key; solo el resultado con IA la necesita.</span>
  </div>
  <button id="keychip" title="Cambiar API key">🔑 Cambiar key</button>

  <div id="root"></div>

  <script>
    (function () {
      var bar = document.getElementById("keybar");
      var chip = document.getElementById("keychip");
      var input = document.getElementById("keyinput");
      var save = document.getElementById("keysave");
      // Modo autónomo: si hay proxy, no se pide key en el navegador.
      if (window.DEMO_PROXY_URL) { bar.style.display = "none"; chip.style.display = "none"; return; }
      function refresh() {
        var has = !!localStorage.getItem("ANTHROPIC_API_KEY");
        bar.style.display = has ? "none" : "flex";
        chip.style.display = has ? "block" : "none";
      }
      save.addEventListener("click", function () {
        var v = (input.value || "").trim();
        if (!v) { input.focus(); return; }
        localStorage.setItem("ANTHROPIC_API_KEY", v);
        input.value = "";
        refresh();
      });
      input.addEventListener("keydown", function (e) { if (e.key === "Enter") save.click(); });
      chip.addEventListener("click", function () { localStorage.removeItem("ANTHROPIC_API_KEY"); refresh(); input.focus(); });
      refresh();
    })();
  </script>

  <script src="app.demo.js?v=20260624a"></script>
</body>
</html>
