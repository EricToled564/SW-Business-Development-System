name: Deploy Claude proxy Worker

# Despliega el proxy (Cloudflare Worker) que guarda la API key de Anthropic server-side,
# para que el demo funcione de forma autónoma para cualquier visitante.
#
# Requiere 3 secrets en el repo (Settings → Secrets and variables → Actions):
#   - CF_API_TOKEN       : token de Cloudflare con permiso "Edit Cloudflare Workers"
#   - CF_ACCOUNT_ID      : Account ID de Cloudflare
#   - ANTHROPIC_API_KEY  : tu API key de Anthropic (sk-ant-...)
#
# Manual (workflow_dispatch): no corre —ni falla— hasta que existan los secrets.

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: resultados/ux-v1/webapp/demo
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Wrangler
        run: npm i -g wrangler@4

      - name: Deploy Worker (crea el script e imprime la URL)
        run: wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}

      - name: Set ANTHROPIC_API_KEY secret on the Worker
        run: printf '%s' "$ANTHROPIC_API_KEY" | wrangler secret put ANTHROPIC_API_KEY
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
